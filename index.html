<!DOCTYPE html>
<html lang="en">

<head>
	<title>HomePage</title>
	<meta charset="UTF-8">
	<meta name="format-detection" content="telephone=no">
	<!-- <style>body{opacity: 0;}</style> -->
	<link rel="stylesheet" href="css/style.min.css?_v=20260421185238">
	<link rel="shortcut icon" href="favicon.ico">
	<!-- <meta name="robots" content="noindex, nofollow"> -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css?_v=20260421185238" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
	<div class="wrapper">
		<header class="header">
			<div class="header__container">
				<div class="header__logo">
					<a href="" class="header__logo-icon"><img src="img/logo.svg" alt="Logo"></a>
					<div class="header__logo-name">
						<p class="header__logo-title">Ondontologia Integral</p>
						<p class="header__logo-subtitle">Salud & Estetica Dental</p>
					</div>
				</div>
				<div class="header__menu menu">
					<nav class="menu__body">
						<div class="menu__icons">
							<a href="" class="menu__icon"><img src="img/icons/linkedin.svg" alt="Linkedin"></a>
							<a href="" class="menu__icon"><img src="img/icons/gmail.svg" alt="Gmail"></a>
							<a href="" class="menu__icon"><img src="img/icons/instagram.svg" alt="Instagram"></a>
							<a href="" class="menu__icon"><img src="img/icons/facebook.svg" alt="Facebook"></a>
						</div>
						<ul class="menu__list">
							<li class="menu__item"><a data-goto=".sarvices" href="#" class="menu__link">Inicio</a></li>
							<li class="menu__item"><a data-goto=".portfolio" href="#" class="menu__link">Servicios</a></li>
							<li class="menu__item"><a data-goto=".career" href="#" class="menu__link">Nosotros</a></li>
							<li class="menu__item"><a data-goto=".blog" href="#" class="menu__link">Contacto</a></li>
						</ul>
					</nav>
				</div>
				<div class="header__actions">
					<a data-da=".menu__icons,767.98" class="header__button button-border">Saca tu turno</a>
					<button type="button" class="icon-menu"><span></span></button>
				</div>
			</div>
		</header>
		<main class="page">

		</main>
		<footer class="footer">
			<div id="map" class="footer__map"></div>
			<div class="footer__text">
				<p>Diseñado por Uncoder.com.ar</p>
			</div>
		</footer>


	</div>
	<script src="js/app.min.js?_v=20260421185238"></script>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js?_v=20260421185238" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<script>
		var map = L.map('map').setView([-31.408166074414183, -64.20115634462167], 17);
		L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
			attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
		}).addTo(map);
		var marker = L.marker([-31.408166074414183, -64.20115634462167]).addTo(map);
		marker.bindPopup("<b>The best dentist in the world!.</b>").openPopup();
	</script>
</body>

</html>
